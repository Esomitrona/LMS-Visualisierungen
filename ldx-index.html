
<style>
:root {
  --color-background-warning: #FFF8E1;
  --color-border-warning: #F59E0B;
  --color-background-secondary: #F3F4F6;
  --color-border-secondary: #D1D5DB;
  --color-border-tertiary: #E5E7EB;
  --color-text-secondary: #6B7280;
  --color-text-tertiary: #9CA3AF;
  --border-radius-md: 8px;
}
@keyframes drift1{0%,100%{transform:translate(0,0)}33%{transform:translate(9px,7px)}66%{transform:translate(-6px,8px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}33%{transform:translate(-8px,5px)}66%{transform:translate(6px,-7px)}}
@keyframes drift3{0%,100%{transform:translate(0,0)}33%{transform:translate(5px,-8px)}66%{transform:translate(-7px,5px)}}
@keyframes rup{0%,100%{transform:translateY(0);opacity:1}60%{transform:translateY(-60px);opacity:0}61%{transform:translateY(0);opacity:0}}
@keyframes eflx{0%{transform:translateY(-56px);opacity:0}12%{opacity:1}66%{transform:translateY(0);opacity:1}82%{opacity:0}100%{transform:translateY(-56px);opacity:0}}
@keyframes rpulse{0%,100%{opacity:.43}50%{opacity:1}}
@keyframes abounce{0%,100%{transform:translateY(0);opacity:.7}50%{transform:translateY(5px);opacity:1}}

.no .nb1{animation:drift1 3.2s ease-in-out infinite}
.no .nb2{animation:drift2 3.7s ease-in-out infinite .5s}
.no .nb3{animation:drift3 4.1s ease-in-out infinite 1s}
.no .nr1{animation:rup 2.8s ease-in-out infinite}
.no .nr2{animation:rup 2.8s ease-in-out infinite .93s}
.no .nr3{animation:rup 2.8s ease-in-out infinite 1.86s}
.no .nexg{opacity:0}
.no .ampm{opacity:0}
.no .eflarr{opacity:0}
.no .rec{opacity:.43}

.ldx .nb1{animation:drift1 3.2s ease-in-out infinite}
.ldx .nb2{animation:drift2 3.7s ease-in-out infinite .5s}
.ldx .nb3{animation:drift3 4.1s ease-in-out infinite 1s}
.ldx .nr1,.ldx .nr2,.ldx .nr3{animation:none;opacity:0}
.ldx .nexg{opacity:1}
.ldx .nex1{animation:eflx 2.0s ease-in-out infinite}
.ldx .nex2{animation:eflx 2.0s ease-in-out infinite .67s}
.ldx .nex3{animation:eflx 2.0s ease-in-out infinite 1.34s}
.ldx .nex4{animation:eflx 2.4s ease-in-out infinite .3s}
.ldx .nex5{animation:eflx 2.4s ease-in-out infinite 1.0s}
.ldx .nex6{animation:eflx 2.4s ease-in-out infinite 1.7s}
.ldx .ampm{opacity:1}
.ldx .eflarr{opacity:1;animation:abounce 1.1s ease-in-out infinite}
.ldx .rec{opacity:.95;animation:rpulse 1.4s ease-in-out infinite}

.sht.ldx .nex2,.sht.ldx .nex3,.sht.ldx .nex4,.sht.ldx .nex5,.sht.ldx .nex6{animation:none;opacity:0!important}
.sht.ldx .nex1{animation:eflx 3.8s ease-in-out infinite!important}
.sht.ldx .ampm{opacity:.28!important}
.sht.ldx .eflarr{opacity:.25!important;animation:abounce 2.8s ease-in-out infinite!important}
.sht.ldx .rec{opacity:.52!important;animation:rpulse 2.8s ease-in-out infinite!important}

.ampm,.nexg,.eflarr{transition:opacity .35s}
.rec{transition:opacity .45s}
</style>

<div id="pdiv" style="display:none;font-size:12px;text-align:center;background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:6px;padding:5px 14px;margin:0 0 7px;line-height:1.6">
  LDX ist ein Prodrug — Erythrozyten-Peptidasen spalten im Blut Lysin ab → aktive Form: <strong>d-Amphetamin</strong>
</div>

<div id="W" class="no da">
<svg width="100%" viewBox="0 0 680 450">
<defs>
<marker id="arx" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arx3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Präsynaptisches Terminal -->
<rect class="c-amber" x="60" y="32" width="450" height="120" rx="20" stroke-width="0.5"/>
<text class="th" id="tlbl" x="285" y="57" text-anchor="middle">Präsynaptisches Terminal (dopaminerg)</text>

<!-- Vesikel -->
<circle cx="175" cy="96" r="24" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<circle id="vc1" cx="175" cy="96" r="10" fill="#D85A30"/>
<circle cx="285" cy="90" r="21" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<circle id="vc2" cx="285" cy="90" r="10" fill="#D85A30"/>
<circle cx="395" cy="96" r="24" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<circle id="vc3" cx="395" cy="96" r="10" fill="#D85A30"/>

<!-- Exozytose-Pfeil -->
<line x1="285" y1="111" x2="285" y2="140" stroke="#BA7517" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arx)" opacity="0.45"/>

<!-- Präsynaptische Membran -->
<rect x="60" y="150" width="450" height="7" fill="#BA7517" opacity="0.18"/>

<!-- Transporter (leicht nach links verschoben um Platz für Pfeil rechts zu lassen) -->
<rect id="t1" x="152" y="141" width="36" height="24" rx="5" fill="#D85A30" stroke="#712B13" stroke-width="0.5"/>
<rect id="t2" x="262" y="141" width="36" height="24" rx="5" fill="#D85A30" stroke="#712B13" stroke-width="0.5"/>
<rect id="t3" x="372" y="141" width="36" height="24" rx="5" fill="#D85A30" stroke="#712B13" stroke-width="0.5"/>
<text id="tl1" class="ts" x="170" y="153" text-anchor="middle" dominant-baseline="central" fill="white">DAT</text>
<text id="tl2" class="ts" x="280" y="153" text-anchor="middle" dominant-baseline="central" fill="white">DAT</text>
<text id="tl3" class="ts" x="390" y="153" text-anchor="middle" dominant-baseline="central" fill="white">DAT</text>

<!-- d-AMP Hexagone: LINKS neben Transporter-Mitte -->
<g class="ampm" transform="translate(159,172)"><polygon points="0,-11 9.5,-5.5 9.5,5.5 0,11 -9.5,5.5 -9.5,-5.5" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.3"/></g>
<g class="ampm" transform="translate(269,172)"><polygon points="0,-11 9.5,-5.5 9.5,5.5 0,11 -9.5,5.5 -9.5,-5.5" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.3"/></g>
<g class="ampm" transform="translate(379,172)"><polygon points="0,-11 9.5,-5.5 9.5,5.5 0,11 -9.5,5.5 -9.5,-5.5" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.3"/></g>

<!-- Efflux-Pfeile: RECHTS neben Transporter, klar sichtbar -->
<g class="eflarr">
  <line x1="195" y1="157" x2="195" y2="187" stroke="#EF9F27" stroke-width="3" stroke-linecap="round" marker-end="url(#arx3)"/>
</g>
<g class="eflarr" style="animation-delay:.37s">
  <line x1="305" y1="157" x2="305" y2="187" stroke="#EF9F27" stroke-width="3" stroke-linecap="round" marker-end="url(#arx3)"/>
</g>
<g class="eflarr" style="animation-delay:.74s">
  <line x1="415" y1="157" x2="415" y2="187" stroke="#EF9F27" stroke-width="3" stroke-linecap="round" marker-end="url(#arx3)"/>
</g>

<!-- Synaptischer Spalt Label -->
<text class="ts" x="285" y="265" text-anchor="middle" opacity="0.35">synaptischer Spalt</text>

<!-- Basis-NT (driften) -->
<circle class="nb1" id="nt1" cx="200" cy="218" r="11" fill="#D85A30"/>
<circle class="nb2" id="nt2" cx="285" cy="210" r="11" fill="#D85A30"/>
<circle class="nb3" id="nt3" cx="372" cy="222" r="11" fill="#D85A30"/>

<!-- Wiederaufnahme-NT (ohne LDX) -->
<circle class="nr1" id="nr1" cx="170" cy="244" r="10" fill="#D85A30"/>
<circle class="nr2" id="nr2" cx="280" cy="237" r="10" fill="#D85A30"/>
<circle class="nr3" id="nr3" cx="395" cy="250" r="10" fill="#D85A30"/>

<!-- Efflux-NT (mit LDX: strömen aus Transporter heraus) -->
<g class="nexg">
  <circle class="nex1" cx="195" cy="218" r="11" fill="#D85A30" opacity="0"/>
  <circle class="nex2" cx="238" cy="207" r="11" fill="#D85A30" opacity="0"/>
  <circle class="nex3" cx="325" cy="232" r="11" fill="#D85A30" opacity="0"/>
  <circle class="nex4" cx="415" cy="218" r="11" fill="#D85A30" opacity="0"/>
  <circle class="nex5" cx="260" cy="248" r="11" fill="#D85A30" opacity="0"/>
  <circle class="nex6" cx="195" cy="248" r="10" fill="#D85A30" opacity="0"/>
</g>

<!-- Postsynaptische Membran -->
<rect x="60" y="273" width="450" height="7" fill="#0C447C" opacity="0.18"/>

<!-- Rezeptoren -->
<rect class="rec" id="rc1" x="152" y="265" width="36" height="20" rx="5" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<rect class="rec" id="rc2" x="262" y="265" width="36" height="20" rx="5" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<rect class="rec" id="rc3" x="372" y="265" width="36" height="20" rx="5" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>

<!-- Postsynaptische Dendrite -->
<rect id="postbox" class="c-coral" x="60" y="281" width="450" height="110" rx="20" stroke-width="0.5"/>
<text class="th" id="plbl" x="285" y="354" text-anchor="middle">Postsynaptische Dendrite (dopaminerg)</text>

<!-- Legende -->
<circle id="lgnt" cx="524" cy="74" r="7" fill="#D85A30"/>
<text class="ts" id="lgntl" x="537" y="78">Dopamin</text>

<rect id="lgtrp" x="519" y="144" width="12" height="12" rx="2" fill="#D85A30" stroke="#712B13" stroke-width="0.5"/>
<text class="ts" id="lgtrpl" x="537" y="153">DAT-Transporter</text>

<g transform="translate(525,196)"><polygon points="0,-9 7.8,-4.5 7.8,4.5 0,9 -7.8,4.5 -7.8,-4.5" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.1"/></g>
<text class="ts" x="537" y="200">d-Amphetamin</text>

<line x1="519" y1="228" x2="531" y2="244" stroke="#EF9F27" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arx3)" opacity="0.9"/>
<text class="ts" x="537" y="244">Efflux (reverser Transport)</text>

<rect class="rec" id="lgrec" x="519" y="268" width="12" height="12" rx="2" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" id="lgrecl" x="537" y="277">D1/D2-Rezeptor</text>
</svg>

<!-- Signalstärke -->
<div style="display:flex;align-items:center;gap:10px;margin:6px 0 4px">
  <span style="font-size:13px;color:var(--color-text-secondary);white-space:nowrap">Signalstärke</span>
  <div style="flex:1;height:8px;border-radius:4px;overflow:hidden;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary)">
    <div id="sbar" style="height:100%;border-radius:4px;transition:width .75s,background .5s"></div>
  </div>
  <span id="sval" style="font-size:13px;font-weight:500;min-width:50px;color:var(--color-text-secondary)"></span>
</div>

<!-- NT-Auswahl -->
<div style="display:flex;gap:6px;margin:7px 0">
  <button id="bda"  onclick="setNT('da')"  style="flex:1;padding:8px;font-size:12px;cursor:pointer;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary)">Dopamin (DA)</button>
  <button id="bna"  onclick="setNT('na')"  style="flex:1;padding:8px;font-size:12px;cursor:pointer;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary)">Noradrenalin (NA)</button>
  <button id="bsht" onclick="setNT('sht')" style="flex:1;padding:8px;font-size:12px;cursor:pointer;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary)">Serotonin (5-HT)</button>
</div>

<!-- Medikament-Toggle -->
<div style="display:flex;gap:6px;margin:0 0 8px">
  <button id="bno"  onclick="setDrug('no')"  style="flex:1;padding:9px;font-size:13px;cursor:pointer;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary)">Ohne LDX</button>
  <button id="bldx" onclick="setDrug('ldx')" style="flex:1;padding:9px;font-size:13px;cursor:pointer;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary)">Mit LDX</button>
</div>

<!-- Infobox -->
<div id="ibox" style="font-size:13px;color:var(--color-text-secondary);line-height:1.7;padding:10px 14px;border-left:2px solid var(--color-border-tertiary)"></div>
</div>

<script>
const C={
  da:{main:'#D85A30',trpF:'#D85A30',trpS:'#712B13',recF:'#B5D4F4',recS:'#185FA5',ntLbl:'Dopamin',trpLbl:'DAT',recLbl:'D1/D2-Rezeptor',postCls:'c-coral',sub:'dopaminerg',sigC:'#D85A30'},
  na:{main:'#1D9E75',trpF:'#1D9E75',trpS:'#085041',recF:'#9FE1CB',recS:'#0F6E56',ntLbl:'Noradrenalin',trpLbl:'NET',recLbl:'α1/β-Rezeptor',postCls:'c-teal',sub:'noradrenerg',sigC:'#1D9E75'},
  sht:{main:'#7F77DD',trpF:'#7F77DD',trpS:'#3C3489',recF:'#CECBF6',recS:'#534AB7',ntLbl:'Serotonin',trpLbl:'SERT',recLbl:'5-HT₁/5-HT₂-Rezeptor',postCls:'c-purple',sub:'serotonerg',sigC:'#7F77DD'}
};
const SIG={da:{no:18,ldx:92},na:{no:18,ldx:78},sht:{no:18,ldx:22}};
const INFO={
  da:{
    no:'Dopamin wird per Vesikel-Exozytose in den Spalt freigesetzt und durch den DAT-Transporter rasch zurückgeholt (Wiederaufnahme). Bei ADHS ist dieser Wiederaufnahme-Prozess im präfrontalen Kortex und Striatum überaktiv — D1/D2-Rezeptoren bleiben chronisch unterstimuliert, was Daueraufmerksamkeit und exekutive Kontrolle beeinträchtigt.',
    ldx:'d-Amphetamin (Hexagon) bindet am DAT und kehrt dessen Transportrichtung um. Gleichzeitig blockiert es VMAT2, wodurch Dopamin aus den Vesikeln ins Zytoplasma austritt. Der DAT wird so vom Wiederaufnahme-Kanal zum Auswurf-Kanal — der orangene Pfeil rechts neben jedem Transporter symbolisiert diesen aktiven Efflux. Das Ergebnis ist eine massive Dopaminflut im synaptischen Spalt und eine intensive Aktivierung der D1/D2-Rezeptoren, die durch die animierte Helligkeitspulsation sichtbar wird.'
  },
  na:{
    no:'Noradrenalin wird nach der Freisetzung durch den NET-Transporter aufgenommen. Bei ADHS führt ein verminderter noradrenerger Tonus im präfrontalen Kortex zu einem geschwächten Aufmerksamkeitsfilter — relevante Signale werden schlechter verstärkt, Ablenkungen schlechter unterdrückt.',
    ldx:'d-Amphetamin kehrt den NET genauso um wie den DAT — aktiver Efflux von Noradrenalin in den Spalt. Die verstärkte Stimulation von α1- und β-Adrenorezeptoren im präfrontalen Kortex verbessert das Signal-Rausch-Verhältnis, stärkt das Arbeitsgedächtnis und schärft die Impulskontrolle. Die noradrenerge Wirkkomponente ergänzt den dopaminergen Mechanismus und deckt damit das gesamte ADHS-Symptomspektrum ab.'
  },
  sht:{
    no:'Serotonin wird nach der Freisetzung durch den SERT-Transporter aus dem Spalt entfernt. Die serotonerge Transmission ist kein primärer Treiber der ADHS-Pathophysiologie, beeinflusst aber Stimmung, Schlaf und Appetit.',
    ldx:'d-Amphetamin hat eine etwa 10-fach geringere Affinität zum SERT als zu DAT oder NET. Es kommt nur zu einem minimalen Anstieg des synaptischen Serotonins mit vernachlässigbarer Rezeptoraktivierung — sichtbar am blassen Efflux-Pfeil und der schwachen Rezeptorpulsation. Diese residuale 5-HT-Wirkung ist bei therapeutischen Dosen klinisch nicht relevant. LDX gilt daher als primär dopaminerg-noradrenerg wirkend.'
  }
};

let nt='da',drug='no';

function applyColors(n){
  const c=C[n];
  ['nt1','nt2','nt3','nr1','nr2','nr3'].forEach(id=>{const el=document.getElementById(id);if(el)el.setAttribute('fill',c.main);});
  document.querySelectorAll('.nex1,.nex2,.nex3,.nex4,.nex5,.nex6').forEach(el=>el.setAttribute('fill',c.main));
  ['vc1','vc2','vc3'].forEach(id=>{const el=document.getElementById(id);if(el)el.setAttribute('fill',c.main);});
  ['t1','t2','t3','lgtrp'].forEach(id=>{const el=document.getElementById(id);if(el){el.setAttribute('fill',c.trpF);el.setAttribute('stroke',c.trpS);}});
  ['tl1','tl2','tl3'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=c.trpLbl;});
  ['rc1','rc2','rc3','lgrec'].forEach(id=>{const el=document.getElementById(id);if(el){el.setAttribute('fill',c.recF);el.setAttribute('stroke',c.recS);}});
  document.getElementById('postbox').setAttribute('class',c.postCls);
  document.getElementById('lgnt').setAttribute('fill',c.main);
  document.getElementById('lgntl').textContent=c.ntLbl;
  document.getElementById('lgtrpl').textContent=c.trpLbl+'-Transporter';
  document.getElementById('lgrecl').textContent=c.recLbl;
  document.getElementById('tlbl').textContent='Präsynaptisches Terminal ('+c.sub+')';
  document.getElementById('plbl').textContent='Postsynaptische Dendrite ('+c.sub+')';
}

function applyState(){
  document.getElementById('W').className=drug+' '+nt;
  document.getElementById('pdiv').style.display=drug==='ldx'?'block':'none';
  const sig=SIG[nt][drug];
  const bar=document.getElementById('sbar');
  bar.style.width=sig+'%';
  bar.style.background=sig<30?'var(--color-text-tertiary)':C[nt].sigC;
  document.getElementById('sval').textContent=sig<30?'Niedrig':sig>70?'Hoch':'Gering';
  document.getElementById('ibox').textContent=INFO[nt][drug];
  ['da','na','sht'].forEach(n=>document.getElementById('b'+n).style.background=nt===n?'var(--color-background-secondary)':'transparent');
  ['no','ldx'].forEach(d=>document.getElementById('b'+d).style.background=drug===d?'var(--color-background-secondary)':'transparent');
}

function setNT(n){nt=n;applyColors(n);applyState();}
function setDrug(d){drug=d;applyState();}
applyColors('da');applyState();
</script>
